<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>KSAM 공지 관리</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <a href="../index.html" class="admin-brand" aria-label="KSAM 홈페이지">
        <img src="../assets/ksam-logo-transparent.png" alt="KSAM" />
      </a>
      <div class="admin-header-actions">
        <span class="save-state" data-save-state>공지 관리</span>
        <a class="icon-button" href="../index.html" target="_blank" title="홈페이지 보기" aria-label="홈페이지 보기">↗</a>
        <button class="text-button" type="button" data-logout hidden>로그아웃</button>
      </div>
    </header>

    <main>
      <section class="login-view" data-login-view>
        <form class="login-panel" data-login-form>
          <img src="../assets/ksam-logo-transparent.png" alt="KSAM" />
          <h1 data-login-heading>관리자 로그인</h1>
          <p class="login-intro" data-login-intro hidden></p>
          <label>
            <span>아이디</span>
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            <span>비밀번호</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <p class="form-message" data-login-message aria-live="polite"></p>
          <button class="primary-button" type="submit" data-login-submit>로그인</button>
        </form>
      </section>

      <section class="admin-workspace" data-admin-workspace hidden>
        <aside class="notice-sidebar">
          <div class="sidebar-heading">
            <div>
              <span>최신 공지사항</span>
              <strong data-notice-count>0개</strong>
            </div>
            <button class="icon-button dark" type="button" data-add-notice title="새 공지" aria-label="새 공지">＋</button>
          </div>
          <div class="notice-admin-list" data-admin-notice-list></div>
        </aside>

        <form class="notice-editor" data-notice-editor>
          <div class="editor-topbar">
            <div>
              <span class="editor-kicker">NOTICE EDITOR</span>
              <strong data-editor-heading>공지 편집</strong>
            </div>
            <div class="editor-actions">
              <button class="text-button danger" type="button" data-delete-notice>삭제</button>
              <a class="text-button" data-preview-link href="../notices.html" target="_blank">미리보기</a>
              <button class="primary-button compact" type="submit">저장</button>
            </div>
          </div>

          <div class="editor-fields">
            <div class="field-row">
              <label>
                <span>게시일</span>
                <input type="date" name="date" required />
              </label>
              <label>
                <span>분류</span>
                <select name="type">
                  <option value="Notice">공지</option>
                  <option value="Conference">학술회</option>
                  <option value="Education">교육</option>
                  <option value="Recruitment">모집</option>
                  <option value="Exchange">교류</option>
                </select>
              </label>
              <label class="toggle-field">
                <input type="checkbox" name="pinned" />
                <span>상단 고정</span>
              </label>
              <label class="toggle-field">
                <input type="checkbox" name="published" checked />
                <span>홈페이지 공개</span>
              </label>
            </div>

            <label class="title-field">
              <span>제목</span>
              <input name="title" maxlength="500" placeholder="중국어 / 한국어 제목" required />
            </label>

            <div class="body-field">
              <span>본문</span>
              <div class="editor-toolbar" role="toolbar" aria-label="본문 서식">
                <button type="button" data-command="bold" title="굵게" aria-label="굵게"><strong>B</strong></button>
                <button type="button" data-command="italic" title="기울임" aria-label="기울임"><em>I</em></button>
                <button type="button" data-block="h2" title="큰 제목" aria-label="큰 제목">H2</button>
                <button type="button" data-block="h3" title="작은 제목" aria-label="작은 제목">H3</button>
                <button type="button" data-command="insertUnorderedList" title="글머리표" aria-label="글머리표">•≡</button>
                <button type="button" data-command="insertOrderedList" title="번호 목록" aria-label="번호 목록">1≡</button>
                <button type="button" data-add-link title="링크" aria-label="링크">⌁</button>
                <button type="button" data-add-image title="사진" aria-label="사진">▧</button>
                <input data-image-input type="file" accept="image/jpeg,image/png,image/webp,image/gif" hidden />
              </div>
              <div class="rich-editor" contenteditable="true" data-rich-editor aria-label="공지 본문"></div>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script src="../assets/vendor/marked.umd.js"></script>
    <script src="../assets/vendor/purify.min.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
