backend:
  name: git-gateway
  branch: main

locale: ko
media_folder: assets/uploads
public_folder: /assets/uploads
collections:
  - name: site_content
    label: 홈페이지 관리
    files:
      - name: notices
        label: 최신 공지사항
        file: data/notices.json
        format: json
        fields:
          - label: 공지 목록
            name: notices
            widget: list
            summary: "{{fields.date}} · {{fields.title}}{{fields.title_zh}}"
            fields:
              - { label: 게시일, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
              - { label: 분류, name: type, widget: select, options: [Notice, Conference, Recruitment, Exchange, Education] }
              - { label: 상단 고정, name: pinned, widget: boolean, default: false }
              - { label: 홈페이지에 공개, name: published, widget: boolean, default: true }
              - { label: 공지 제목, name: title, widget: string, required: false, hint: "중국어와 한국어를 함께 입력해도 됩니다." }
              - label: 공지 본문
                name: body
                widget: richtext
                required: false
                modes: [rich_text]
                buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
                editor_components: [image]
                sanitize_preview: true
                hint: "워드처럼 작성하고 사진 버튼으로 JPG 또는 PNG 이미지를 본문에 넣을 수 있습니다."
              - { label: 기존 중국어 제목, name: title_zh, widget: hidden, required: false, default: "" }
              - { label: 기존 중국어 내용, name: body_zh, widget: hidden, required: false, default: "" }
              - { label: 기존 한국어 제목, name: title_ko, widget: hidden, required: false, default: "" }
              - { label: 기존 한국어 내용, name: body_ko, widget: hidden, required: false, default: "" }
